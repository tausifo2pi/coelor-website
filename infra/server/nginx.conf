events {
  worker_connections 1024;
}

http {
  # Redirect all HTTP → HTTPS (non-www canonical)
  server {
    listen 80;
    server_name coelor.com www.coelor.com;
    return 301 https://coelor.com$request_uri;
  }

  # Redirect www → non-www over HTTPS
  server {
    listen 443 ssl;
    server_name www.coelor.com;

    ssl_certificate     /etc/letsencrypt/live/coelor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coelor.com/privkey.pem;

    return 301 https://coelor.com$request_uri;
  }

  # Main site
  server {
    listen 443 ssl;
    server_name coelor.com;

    ssl_certificate     /etc/letsencrypt/live/coelor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coelor.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://coelor:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}